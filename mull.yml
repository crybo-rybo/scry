quiet: false
silent: false
strict: true
junkDetectionDisabled: false

mutators:
  - cxx_add_to_sub
  - cxx_sub_to_add
  - cxx_mul_to_div
  - cxx_div_to_mul
  - cxx_eq_to_ne
  - cxx_ne_to_eq
  - cxx_gt_to_le
  - cxx_ge_to_lt
  - cxx_lt_to_ge
  - cxx_le_to_gt
  - cxx_remove_negation
  - cxx_remove_void_call

includePaths:
  - '.*/src/machine/turn_machine\.cpp$'
  - '.*/src/protocol/sse\.cpp$'
  - '.*/src/core/retry\.cpp$'

excludePaths:
  - '.*/tests/.*'
  - '.*/build/.*'
  - '.*/_deps/.*'

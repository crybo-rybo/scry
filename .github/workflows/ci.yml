# Per-commit CI ring (ENGINEERING.md §6, ring 1).
#
# Live gates: format (pinned clang-format-18), core build matrix with
# warnings-as-errors (QA-006/PORT-001/PORT-005) plus the libcurl runtime
# integration spike on the GCC leg (PORT-006), lizard complexity + contract
# tests + install/package-consumer via ci-local.sh, absolute diff branch
# coverage + component floors + CRAP gates (QA-001/003/007, ADR 0011),
# ASan/UBSan/TSan (QA-005), clang-tidy (QA-004 cognitive), gating GCC 16
# reflection leg (PORT-002), short protocol fuzzing (NET-004), and the
# opt-in M5 showcase contract (SHOW-001–004).
#
# Toolchains are pinned deliberately (ENGINEERING.md §7): compiler drift on
# experimental legs is a first-class risk.
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format (pinned 18)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install pinned formatter
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-18 --dry-run --Werror

  core:
    name: Core (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC 14
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
            libcxx: false
            packages: g++-14 libcurl4-openssl-dev
            # The GCC leg also owns the libcurl runtime integration spike
            # (PORT-006); it needs no dedicated runner.
            extra_flags: -DSCRY_BUILD_CURL_SPIKE=ON
          - name: Linux Clang 18
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
            libcxx: true
            packages: clang-18 libc++-dev libc++abi-dev libcurl4-openssl-dev
            extra_flags: ""
          - name: macOS AppleClang
            os: macos-15
            cc: clang
            cxx: clang++
            libcxx: false
            packages: ""
            extra_flags: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      # The dedicated format job owns the formatting gate with a pinned
      # clang-format; core legs skip it so unpinned tool versions can't skew.
      SCRY_FORMAT_CHECK: "0"
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y ninja-build ${{ matrix.packages }}
      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Install complexity checker
        run: python3 -m pip install --user --break-system-packages lizard==1.22.1
      - name: Run local-equivalent CI
        run: >
          ./scripts/ci-local.sh
          -DSCRY_USE_LIBCXX=${{ matrix.libcxx }}
          ${{ matrix.extra_flags }}

  quality:
    name: Coverage + CRAP gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC: clang-18
      CXX: clang++-18
      # The merge-base is only used to identify changed lines for diff
      # coverage; the gates themselves are absolute (ADR 0011).
      SCRY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install pinned quality tools
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          clang-18 llvm-18 libc++-dev libc++abi-dev libcurl4-openssl-dev ninja-build
      - name: Install pinned complexity checker
        run: python3 -m pip install --user --break-system-packages lizard==1.22.1
      - name: Enforce absolute coverage and CRAP gates
        run: ./scripts/quality-gate.sh

  static-analysis:
    name: clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v7.0.0
      - run: >
          sudo apt-get update &&
          sudo apt-get install -y
          clang-18 clang-tidy-18 libc++-dev libc++abi-dev
          libcurl4-openssl-dev ninja-build
      - name: Configure
        run: >
          cmake --preset ci
          -B build/tidy
          -DSCRY_ENABLE_CLANG_TIDY=ON
          -DSCRY_ENABLE_FORMAT_CHECK=OFF
          -DSCRY_USE_LIBCXX=ON
      - name: Analyze
        run: cmake --build build/tidy

  sanitizers:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan + UBSan
            preset: asan
            cc: gcc-14
            cxx: g++-14
            packages: g++-14 libcurl4-openssl-dev ninja-build
            use_libcxx: false
            ctest_flags: ""
          - name: TSan
            preset: tsan
            cc: clang-18
            cxx: clang++-18
            packages: clang-18 libc++-dev libc++abi-dev libcurl4-openssl-dev ninja-build
            use_libcxx: true
            # TSan is where nondeterminism shows up; the repeat runs live here
            # (QA-008) instead of on every leg.
            ctest_flags: --repeat until-fail:3
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install sanitizer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Lower ASLR entropy for sanitizers
        # High-entropy ASLR (vm.mmap_rnd_bits=32) breaks ASan/TSan
        # shadow-memory mapping on Ubuntu 24.04 runners.
        run: sudo sysctl vm.mmap_rnd_bits=28
      - run: |
          # GCC keeps alloc/dealloc mismatch detection live for ASan; Ubuntu's
          # libc++ packaging otherwise triggers LP #2000322 on std exceptions.
          cmake --preset ${{ matrix.preset }} \
            -DSCRY_USE_LIBCXX=${{ matrix.use_libcxx }}
          cmake --build build/${{ matrix.preset }}
          ctest --test-dir build/${{ matrix.preset }} --output-on-failure \
            ${{ matrix.ctest_flags }}

  reflection:
    name: GCC 16 supported reflection component
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install GCC 16
        run: |
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-16 libcurl4-openssl-dev ninja-build
      - name: Lower ASLR entropy for sanitizers
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Install pinned reflection coverage tool
        run: python3 -m pip install --user --break-system-packages gcovr==8.6
      - name: Build, test, install, consume, and cover reflection component
        run: ./scripts/ci-reflection.sh

  fuzz:
    name: Short protocol fuzzing
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # Clang 18 advertises the pre-DR concepts feature level, so GCC 14
      # intentionally withholds C++23 std::expected. LLVM 21 keeps the fuzz
      # target on libstdc++ (matching its packaged libFuzzer runtime) while
      # the Clang 18/libc++ core leg remains the portability authority.
      CC: clang-21
      CXX: clang++-21
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install the pinned fuzz toolchain
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y \
            clang-21 g++-14 libclang-rt-21-dev libcurl4-openssl-dev \
            libfuzzer-21-dev ninja-build
      - run: |
          cmake --preset fuzz
          cmake --build build/fuzz --target \
            scry_sse_fuzz scry_anthropic_fuzz scry_openai_fuzz
          ctest --test-dir build/fuzz --output-on-failure -R 'fuzz'

  showcase:
    name: Opt-in Dear ImGui + grid-NPC showcase
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install showcase toolchain
        run: >
          sudo apt-get update &&
          sudo apt-get install -y
          g++-14 libcurl4-openssl-dev ninja-build
      - name: Build, test, render a headless frame, and audit packaging
        run: ./scripts/ci-showcase.sh

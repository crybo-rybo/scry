# Per-commit CI ring (ENGINEERING.md §6, ADR 0012 release posture).
#
# Live gates: format (pinned clang-format-18), core build matrix with
# warnings-as-errors plus complexity, contract tests, and the
# install/package-consumer audit via ci-local.sh, ASan/UBSan/TSan,
# clang-tidy, and the gating GCC 16 reflection leg. Fuzzing, the showcase,
# and the local-model smoke live in nightly.yml.
#
# Toolchains are pinned deliberately (ENGINEERING.md §7): compiler drift on
# experimental legs is a first-class risk.
name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format (pinned 18)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install pinned formatter
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-18 --dry-run --Werror

  core:
    name: Core (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC 14
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
            libcxx: false
            packages: g++-14 libcurl4-openssl-dev
          - name: Linux Clang 18
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
            libcxx: true
            packages: clang-18 libc++-dev libc++abi-dev libcurl4-openssl-dev
          - name: macOS AppleClang
            os: macos-15
            cc: clang
            cxx: clang++
            libcxx: false
            packages: ""
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      # The dedicated format job owns the formatting gate with a pinned
      # clang-format; core legs skip it so unpinned tool versions can't skew.
      SCRY_FORMAT_CHECK: "0"
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update &&
          sudo apt-get install -y ninja-build ${{ matrix.packages }}
      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Install complexity checker
        run: python3 -m pip install --user --break-system-packages lizard==1.22.1
      - name: Run local-equivalent CI
        run: >
          ./scripts/ci-local.sh
          -DSCRY_USE_LIBCXX=${{ matrix.libcxx }}

  static-analysis:
    name: clang-tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v7.0.0
      - run: >
          sudo apt-get update &&
          sudo apt-get install -y
          clang-18 clang-tidy-18 libc++-dev libc++abi-dev
          libcurl4-openssl-dev ninja-build
      - name: Configure
        run: >
          cmake --preset ci
          -B build/tidy
          -DSCRY_ENABLE_CLANG_TIDY=ON
          -DSCRY_ENABLE_FORMAT_CHECK=OFF
          -DSCRY_USE_LIBCXX=ON
      - name: Analyze
        run: cmake --build build/tidy

  sanitizers:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ASan + UBSan
            preset: asan
            cc: gcc-14
            cxx: g++-14
            packages: g++-14 libcurl4-openssl-dev ninja-build
            use_libcxx: false
            ctest_flags: ""
          - name: TSan
            preset: tsan
            cc: clang-18
            cxx: clang++-18
            packages: clang-18 libc++-dev libc++abi-dev libcurl4-openssl-dev ninja-build
            use_libcxx: true
            # TSan is where nondeterminism shows up; the repeat runs live here
            # (QA-008) instead of on every leg.
            ctest_flags: --repeat until-fail:3
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install sanitizer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Lower ASLR entropy for sanitizers
        # High-entropy ASLR (vm.mmap_rnd_bits=32) breaks ASan/TSan
        # shadow-memory mapping on Ubuntu 24.04 runners.
        run: sudo sysctl vm.mmap_rnd_bits=28
      - run: |
          # GCC keeps alloc/dealloc mismatch detection live for ASan; Ubuntu's
          # libc++ packaging otherwise triggers LP #2000322 on std exceptions.
          cmake --preset ${{ matrix.preset }} \
            -DSCRY_USE_LIBCXX=${{ matrix.use_libcxx }}
          cmake --build build/${{ matrix.preset }}
          ctest --test-dir build/${{ matrix.preset }} --output-on-failure \
            ${{ matrix.ctest_flags }}

  reflection:
    name: GCC 16 supported reflection component
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install GCC 16 (and GCC 14 for the core-surface proof)
        run: |
          sudo add-apt-repository --yes ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14 g++-16 libcurl4-openssl-dev ninja-build
      - name: Lower ASLR entropy for sanitizers
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Build, test, install, and consume reflection component
        run: ./scripts/ci-reflection.sh

# Per-commit CI ring (ENGINEERING.md §6, ring 1).
#
# Live gates: format, build matrix (QA-006/PORT-001/PORT-005), tests,
# ASan/UBSan/TSan (QA-005), clang-tidy (QA-004 cognitive complexity).
# Still planned for M0 (tracked in REQUIREMENTS.md): diff coverage (QA-001),
# CRAP gate (QA-003), lizard cyclomatic gate (QA-004), ratchet comparison
# (QA-007).
#
# The clang-p2996 leg is a non-gating toolchain probe until Spike A pins the
# reflection toolchain (ADR 0004); the GCC-trunk reflection leg lands with
# that spike.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: git ls-files '*.cpp' '*.hpp' | xargs clang-format-18 --dry-run --Werror

  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux · GCC 14 · reflection OFF
            os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14
          - name: Linux · Clang 18 · reflection OFF
            os: ubuntu-24.04
            cc: clang-18
            cxx: clang++-18
          - name: macOS · AppleClang · reflection OFF
            os: macos-15
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Install ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Configure
        run: cmake --preset dev
      - name: Build
        run: cmake --build --preset dev
      - name: Test
        run: ctest --preset dev

  sanitizers:
    name: ${{ matrix.preset }} · Linux · Clang 18
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [asan-ubsan, tsan]
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Lower ASLR entropy for sanitizers
        # Ubuntu 24.04 runners default to vm.mmap_rnd_bits=32, which breaks
        # ASan/TSan shadow-memory mapping.
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang-tidy-18
      - name: Configure (emits compile_commands.json)
        run: cmake --preset dev
      - name: Run clang-tidy over project sources
        run: run-clang-tidy-18 -quiet -p build/dev $(git ls-files '*.cpp')

  reflection-probe:
    name: Linux · clang-p2996 · reflection ON (non-gating probe)
    runs-on: ubuntu-24.04
    # Non-gating until Spike A pins the reflection toolchain (ADR 0004):
    # the community image is a convenience, not yet an owned dependency.
    continue-on-error: true
    container: vsavkov/clang-p2996:amd64
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: Install build tools in container
        run: apt-get update && apt-get install -y cmake ninja-build git
      - uses: actions/checkout@v4
      - name: Configure (reflection ON)
        run: cmake --preset reflection
      - name: Build
        run: cmake --build --preset reflection
      - name: Test
        run: ctest --preset reflection
